plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Load signing credentials from key.properties, environment variables, or local.properties
def keyAliasVal = System.getenv("KEY_ALIAS") ?: (localProperties.getProperty("keyAlias") ?: "money_manager")
def keyPasswordVal = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty("keyPassword")
def storePasswordVal = System.getenv("KEYSTORE_PASSWORD") ?: localProperties.getProperty("storePassword")
def storeFileVal = System.getenv("KEYSTORE_FILE") ?: (localProperties.getProperty("storeFile") ?: "money_manager.keystore")

def keyPropertiesFile = rootProject.file("key.properties")
if (keyPropertiesFile.exists()) {
    def keyProperties = new Properties()
    keyPropertiesFile.withReader("UTF-8") { reader -> keyProperties.load(reader) }
    if (System.getenv("KEY_ALIAS") == null && keyProperties.containsKey("keyAlias")) {
        keyAliasVal = keyProperties.getProperty("keyAlias")
    }
    if (System.getenv("KEY_PASSWORD") == null && keyProperties.containsKey("keyPassword")) {
        keyPasswordVal = keyProperties.getProperty("keyPassword")
    }
    if (System.getenv("KEYSTORE_PASSWORD") == null && keyProperties.containsKey("storePassword")) {
        storePasswordVal = keyProperties.getProperty("storePassword")
    }
    if (System.getenv("KEYSTORE_FILE") == null && keyProperties.containsKey("storeFile")) {
        storeFileVal = keyProperties.getProperty("storeFile")
    }
}

android {
    namespace = "com.saisurya.moneymanager"
    compileSdk = 34
    ndkVersion = flutter.ndkVersion

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    packaging {
        resources {
            excludes += '/META-INF/INDEX.LIST'
            excludes += '/META-INF/DEPENDENCIES'
            excludes += '/META-INF/LICENSE'
            excludes += '/META-INF/LICENSE.txt'
            excludes += '/META-INF/NOTICE'
            excludes += '/META-INF/NOTICE.txt'
        }
    }

    defaultConfig {
        applicationId = "com.saisurya.moneymanager"
        minSdk = 26
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true
        buildConfigField "String", "GOOGLE_API_KEY", "\"${localProperties.getProperty('GOOGLE_API_KEY') ?: ''}\""
    }

    signingConfigs {
        release {
            keyAlias = keyAliasVal
            keyPassword = keyPasswordVal
            storeFile = storeFileVal ? file(storeFileVal) : null
            storePassword = storePasswordVal
        }
    }

    buildTypes {
        debug {
            // Use the same stable key as release if configured, or default signing config
            signingConfig = (keyPasswordVal != null && storePasswordVal != null) ? signingConfigs.release : null
        }
        release {
            signingConfig = signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Fail release builds gracefully if any configuration is missing
    gradle.taskGraph.whenReady { taskGraph ->
        if (taskGraph.hasTask(':app:assembleRelease') || taskGraph.hasTask(':app:bundleRelease')) {
            if (keyPasswordVal == null || storePasswordVal == null || storeFileVal == null) {
                throw new GradleException("Release signing configuration is missing. " +
                    "Please configure keyAlias, keyPassword, storePassword, and storeFile in key.properties, " +
                    "local.properties, or via environment variables (KEY_ALIAS, KEY_PASSWORD, KEYSTORE_PASSWORD, KEYSTORE_FILE).")
            }
            if (storeFileVal != null && !file(storeFileVal).exists()) {
                throw new GradleException("Keystore file not found at: " + file(storeFileVal).absolutePath + 
                    ". Please check storeFile configuration.")
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}
