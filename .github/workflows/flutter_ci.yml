name: Flutter CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel any in-progress run on the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # CI  ─ Runs on every push and every PR
  # ─────────────────────────────────────────────────────────────────
  ci:
    name: 🔍 Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🐦 Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze
        run: flutter analyze --fatal-infos

      - name: 🧪 Run tests
        run: flutter test

  # ─────────────────────────────────────────────────────────────────
  # CD  ─ Runs only on push to main / master  (not PRs)
  # Produces exactly ONE release APK, signed with a stable keystore,
  # so users can always update without uninstalling.
  # ─────────────────────────────────────────────────────────────────
  cd:
    name: 📦 Build & Release APK
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can tag correctly

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🐦 Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      # ── Decode & restore the stable keystore from GitHub Secrets ──
      - name: 🔐 Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/money_manager.keystore

      # ── Write key.properties from GitHub Secrets ──────────────────
      - name: 🔐 Write key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=money_manager.keystore\n' \
            '${{ secrets.KEYSTORE_PASSWORD }}' \
            '${{ secrets.KEY_PASSWORD }}' \
            '${{ secrets.KEY_ALIAS }}' \
            > android/key.properties

      # ── Auto-derive versionCode from run number so each build is ──
      # ── treated as an upgrade by Android (never triggers reinstall)─
      - name: 🏷️ Derive version & bump versionCode
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          VERSION_CODE=${{ github.run_number }}
          TAG="v${VERSION}-build${VERSION_CODE}"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "flutter.versionCode=${VERSION_CODE}" >> android/local.properties
          echo "flutter.versionName=${VERSION}"      >> android/local.properties

      # ── Build exactly ONE release APK ────────────────────────────
      - name: 🔨 Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      # ── Rename to a human-friendly filename ──────────────────────
      - name: 📋 Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk

      # ── Upload as workflow artifact (always downloadable) ─────────
      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk
          retention-days: 30

      # ── Create a GitHub Release and attach the APK ───────────────
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Money Manager ${{ steps.version.outputs.version }} 🚀"
          body: |
            ## 📦 Money Manager — Automated Release

            **Build:** `${{ steps.version.outputs.tag }}`
            **Version Code:** `${{ steps.version.outputs.code }}`
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### 📲 How to Install / Update
            1. Download `MoneyManager-${{ steps.version.outputs.tag }}.apk` below.
            2. Enable **"Install from unknown sources"** in Android Settings if prompted.
            3. Tap the APK — Android will **update** the existing app directly (no uninstall needed ✅).

            ### ✅ This build
            - Passed `flutter analyze --fatal-infos` ✓
            - Passed all unit tests ✓
            - Signed with the stable project keystore ✓
          files: build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
