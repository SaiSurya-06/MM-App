name: Flutter CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel any in-progress run on the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # CI  ─ Runs on every push and every PR
  # ─────────────────────────────────────────────────────────────────
  ci:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🐦 Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze
        run: flutter analyze --fatal-infos

      - name: 🧪 Run tests with coverage
        run: flutter test --coverage

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # CD  ─ Runs only on push to main / master  (not PRs)
  # ─────────────────────────────────────────────────────────────────
  cd:
    name: Build & Release APK
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can tag correctly

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: 🐦 Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      # ── Build ────────────────────────────────────────────────────
      - name: 🔨 Build production APK
        run: flutter build apk --release

      # ── Derive version tag from pubspec.yaml ─────────────────────
      - name: 🏷️ Derive version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          BUILD=$(date +'%Y%m%d%H%M')
          TAG="v${VERSION}-build${BUILD}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Rename APKs with version for clarity ─────────────────────
      - name: 📋 Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk

      # ── Upload APKs as workflow artifacts (always accessible) ─────
      - name: ⬆️ Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk
          retention-days: 30

      # ── Create a GitHub Release and attach all three APKs ─────────
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Money Manager ${{ steps.version.outputs.version }} 🚀"
          body: |
            ## 📦 Money Manager — Automated Release

            **Build:** `${{ steps.version.outputs.tag }}`
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### 📲 Install
            Download `MoneyManager-${{ steps.version.outputs.tag }}.apk` below.
            Works on **all Android devices** (arm32, arm64, x86_64).

            > Enable **"Install from unknown sources"** in Android settings before installing.

            ### ✅ What's in this build
            - All CI checks passed (analyze + unit tests)
            - Built with Flutter stable channel
          files: build/app/outputs/flutter-apk/MoneyManager-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
